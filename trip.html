<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trip — World Cup 2026</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="page">

  <!-- Day Header -->
  <div class="day-header">
    <div class="day-header__nav">
      <button id="prevBtn" title="Previous day">&#8592;</button>
      <div class="day-header__date">
        <h2 id="dayTitle">Loading…</h2>
        <p id="daySubtitle"></p>
      </div>
      <button id="nextBtn" title="Next day">&#8594;</button>
    </div>
    <div class="day-dots" id="dayDots"></div>
  </div>

  <!-- Location Bar -->
  <div class="location-bar" id="locationBar">
    <span class="location-bar__icon">📍</span>
    <span class="location-bar__text empty" id="locationText">Tap to set location</span>
    <span class="location-bar__edit">Edit</span>
  </div>

  <!-- Swipeable content -->
  <div class="swipe-container" id="swipeContainer">
    <div id="dayContent"><div class="spinner"></div></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabBtn" title="Add item">+</button>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="active" id="navTrip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Trip
    </a>
    <a href="/shortlist" id="navShortlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6"  x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3" cy="6"  r="1" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="18" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Shortlist
    </a>
    <a href="/checklist" id="navChecklist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Checklist
    </a>
  </nav>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Add / Edit Entry Sheet -->
  <div class="sheet" id="entrySheet">
    <div class="sheet__handle"></div>
    <div class="sheet__title" id="sheetTitle">Add to day</div>

    <form id="entryForm">
      <input type="hidden" id="entryId" />

      <div class="form-group">
        <label>Type</label>
        <select id="entryType">
          <option value="accommodation">🏨 Accommodation</option>
          <option value="travel">✈️ Travel</option>
          <option value="game">⚽ Game</option>
          <option value="activity" selected>🎯 Activity</option>
          <option value="note">📝 Note</option>
        </select>
      </div>

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="entryTitle" placeholder="Enter a title…" required />
      </div>

      <!-- Travel fields -->
      <div class="type-fields" id="fields-travel">
        <div class="form-group">
          <label>Mode</label>
          <select id="travelMode">
            <option value="flight">✈️ Flight</option>
            <option value="train">🚆 Train</option>
            <option value="car">🚗 Car</option>
            <option value="bus">🚌 Bus</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>From</label>
            <input type="text" id="travelFrom" placeholder="Departure" />
          </div>
          <div class="form-group">
            <label>To</label>
            <input type="text" id="travelTo" placeholder="Arrival" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Departure time</label>
            <input type="time" id="travelDep" />
          </div>
          <div class="form-group">
            <label>Arrival time</label>
            <input type="time" id="travelArr" />
          </div>
        </div>
        <div class="form-group">
          <label>Confirmation #</label>
          <input type="text" id="travelRef" placeholder="Booking reference" />
        </div>
        <div class="form-group">
          <label>Booking link</label>
          <input type="url" id="travelLink" placeholder="https://…" />
        </div>
      </div>

      <!-- Game fields -->
      <div class="type-fields" id="fields-game">
        <div class="form-row">
          <div class="form-group">
            <label>Home team</label>
            <input type="text" id="gameHome" placeholder="e.g. USA" />
          </div>
          <div class="form-group">
            <label>Away team</label>
            <input type="text" id="gameAway" placeholder="e.g. Brazil" />
          </div>
        </div>
        <div class="form-group">
          <label>Venue</label>
          <input type="text" id="gameVenue" placeholder="Stadium name" />
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" id="gameCity" placeholder="City" />
        </div>
        <div class="form-group">
          <label>Kick-off time</label>
          <input type="time" id="gameKickoff" />
        </div>
        <div class="form-group">
          <label>Ticket reference</label>
          <input type="text" id="gameTicket" placeholder="Ticket #" />
        </div>
      </div>

      <!-- Activity fields -->
      <div class="type-fields active" id="fields-activity">
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="actLocation" placeholder="Where?" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="actDescription" rows="2" placeholder="Details…"></textarea>
        </div>
        <div class="form-group">
          <label>Link</label>
          <input type="url" id="actLink" placeholder="https://…" />
        </div>
      </div>

      <!-- Accommodation fields -->
      <div class="type-fields" id="fields-accommodation">
        <div class="form-group">
          <label>Location / Address</label>
          <input type="text" id="accomLocation" placeholder="Address or area" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Check-in</label>
            <input type="time" id="accomCheckin" />
          </div>
          <div class="form-group">
            <label>Check-out</label>
            <input type="time" id="accomCheckout" />
          </div>
        </div>
        <div class="form-group">
          <label>Booking link</label>
          <input type="url" id="accomLink" placeholder="https://…" />
        </div>
      </div>

      <!-- Note fields -->
      <div class="type-fields" id="fields-note">
        <div class="form-group">
          <label>Note</label>
          <textarea id="noteContent" rows="4" placeholder="Your note…"></textarea>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="button" class="btn btn-ghost" id="cancelBtn" style="flex:1">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn" style="flex:2">Save</button>
      </div>
    </form>
  </div>

  <!-- Location Sheet -->
  <div class="sheet" id="locationSheet">
    <div class="sheet__handle"></div>
    <div class="sheet__title">Set location for this day</div>
    <div class="form-group">
      <label>City / Location</label>
      <input type="text" id="locationInput" placeholder="e.g. Dallas, TX" />
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button type="button" class="btn btn-ghost" id="cancelLocationBtn" style="flex:1">Cancel</button>
      <button type="button" class="btn btn-primary" id="saveLocationBtn" style="flex:2">Save</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/trip.js"></script>
</body>
</html>
