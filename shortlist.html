<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortlist — World Cup Trip</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="page">

  <div class="shortlist-header">
    <h1>📋 Shortlist</h1>
    <p>Ideas to explore — assign them to a day when you're ready.</p>
  </div>

  <div class="shortlist-grid" id="shortlistGrid">
    <div class="spinner"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabBtn" title="Add to shortlist">+</button>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/trip" id="navTrip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Trip
    </a>
    <a href="#" class="active" id="navShortlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6"  x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3" cy="6"  r="1" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="18" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Shortlist
    </a>
    <a href="/checklist" id="navChecklist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Checklist
    </a>
  </nav>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Add / Edit Shortlist Item Sheet -->
  <div class="sheet" id="itemSheet">
    <div class="sheet__handle"></div>
    <div class="sheet__title" id="itemSheetTitle">Add to shortlist</div>
    <form id="itemForm">
      <input type="hidden" id="itemId" />
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="itemName" placeholder="What is it?" required />
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="itemLocation" placeholder="City or venue" />
      </div>
      <div class="form-group">
        <label>Link</label>
        <input type="url" id="itemLink" placeholder="https://…" />
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="button" class="btn btn-ghost" id="cancelItemBtn" style="flex:1">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveItemBtn" style="flex:2">Save</button>
      </div>
    </form>
  </div>

  <!-- Assign to Day Sheet -->
  <div class="sheet" id="assignSheet">
    <div class="sheet__handle"></div>
    <div class="sheet__title">Assign to day</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">
      This will add it as an activity and remove it from your shortlist.
    </p>
    <input type="hidden" id="assignItemId" />
    <div class="form-group">
      <label>Choose a day</label>
      <select id="assignDate"></select>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button type="button" class="btn btn-ghost" id="cancelAssignBtn" style="flex:1">Cancel</button>
      <button type="button" class="btn btn-primary" id="confirmAssignBtn" style="flex:2">Assign</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/shortlist.js"></script>
</body>
</html>
