<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist — World Cup Trip</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="page">

  <div class="checklist-header">
    <h1>✅ Pre-trip checklist</h1>
    <p>Things to sort before you go.</p>
  </div>

  <div class="checklist-body" id="checklistBody">
    <div class="spinner"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabBtn" title="Add item">+</button>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/trip" id="navTrip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Trip
    </a>
    <a href="/shortlist" id="navShortlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6"  x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3" cy="6"  r="1" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/>
        <circle cx="3" cy="18" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Shortlist
    </a>
    <a href="#" class="active" id="navChecklist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Checklist
    </a>
  </nav>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Add Item Sheet -->
  <div class="sheet" id="addSheet">
    <div class="sheet__handle"></div>
    <div class="sheet__title">Add checklist item</div>
    <form id="addForm">
      <div class="form-group">
        <label>Task</label>
        <input type="text" id="taskText" placeholder="e.g. Book travel insurance" required />
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="button" class="btn btn-ghost" id="cancelBtn" style="flex:1">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn" style="flex:2">Add</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/checklist.js"></script>
</body>
</html>
